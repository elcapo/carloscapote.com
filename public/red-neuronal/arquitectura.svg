<style>.nn-arch{--txt:#09090B;--muted:#52525B;--border:#27272A;--accent:#AA2B95;--hidden:#EEDDCF;--line:#A1A1AA;--neuron-fill:#F7EFE9;}@media (prefers-color-scheme: dark){:root:not([data-theme="light"]) .nn-arch{--txt:#F7EFE9;--muted:#A1A1AA;--border:#A1A1AA;--accent:#CB5AB8;--hidden:#52525B;--line:#71717A;--neuron-fill:#222221;}}:root[data-theme="dark"] .nn-arch{--txt:#F7EFE9;--muted:#A1A1AA;--border:#A1A1AA;--accent:#CB5AB8;--hidden:#52525B;--line:#71717A;--neuron-fill:#222221;}.nn-arch .title{font-size:22px;font-weight:600;fill:var(--txt)}.nn-arch .sub{font-size:13px;fill:var(--muted);letter-spacing:0.04em;text-transform:uppercase;font-family:ui-monospace,Consolas,monospace}.nn-arch .lbl{font-size:16px;font-weight:600;fill:var(--txt)}.nn-arch .cnt{font-size:12px;fill:var(--muted);font-family:ui-monospace,Consolas,monospace}.nn-arch .dots{font-size:24px;fill:var(--muted);font-weight:700}.nn-arch .tag{font-size:12px;fill:var(--muted);font-family:ui-monospace,Consolas,monospace}.nn-arch .neuron-in{fill:var(--neuron-fill);stroke:var(--border)}.nn-arch .neuron-h{fill:var(--hidden);stroke:var(--border)}.nn-arch .neuron-out{fill:var(--accent);stroke:var(--accent)}.nn-arch .conn{stroke:var(--line);stroke-width:1;opacity:0.4}</style>
