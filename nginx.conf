server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Astro usa `build.format: 'directory'` por defecto, así que cada ruta
    # es una carpeta con su `index.html`. Intentamos también `.html` por si
    # en algún momento se cambia el formato.
    location / {
        try_files $uri $uri/index.html $uri.html =404;
    }

    # Assets con hash en el nombre: cache inmutable y larga.
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Sitemap: application/xml en vez de text/xml.
    location = /sitemap.xml {
        root /usr/share/nginx/html;
        types { }
        default_type application/xml;
    }

    # HTML no se cachea para que los despliegues se propaguen inmediatamente.
    location ~* \.html$ {
        add_header Cache-Control "no-cache";
    }

    # Compresión de texto.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        application/javascript
        application/json
        application/xml
        application/rss+xml
        image/svg+xml;

    error_page 404 /404.html;
}
